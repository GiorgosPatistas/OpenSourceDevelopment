name: Deploy to GitHub Pages

# Τρέχει σε κάθε push στο main
on:
  push:
    branches: [main]

  # Επιτρέπει και manual trigger από το GitHub Actions tab
  workflow_dispatch:

# Permissions για GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Αποτρέπει παράλληλα deployments
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build Site & Deploy
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1. Compile το Go engine ──────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: engine/go.sum

      - name: Build Go engine (Linux)
        working-directory: engine
        run: |
          go mod tidy
          GOOS=linux GOARCH=amd64 go build -o ../bin/engine-linux .

      - name: Make engine executable
        run: chmod +x bin/engine-linux

      # ── 2. Build το TypeScript CLI ───────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Node dependencies
        run: pnpm install

      - name: Build TypeScript CLI
        run: pnpm build

      # ── 3. Τρέξε τον generator ───────────────────────────────────────────────
      - name: Generate site
        run: node dist/index.js build example-site

      # ── 4. Deploy στο GitHub Pages ───────────────────────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: example-site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
