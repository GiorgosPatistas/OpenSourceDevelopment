name: CI

# Τρέχει σε κάθε push και pull request στο main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Build & validate το Go engine ──────────────────────────────────
  build-go:
    name: Go Engine Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true                      # cache των Go modules για ταχύτητα
          cache-dependency-path: engine/go.sum

      - name: Download dependencies
        working-directory: engine
        run: go mod tidy

      - name: go vet (static analysis)
        working-directory: engine
        run: go vet ./...

      - name: Build for Linux
        working-directory: engine
        run: GOOS=linux GOARCH=amd64 go build -o /dev/null .

      - name: Build for Windows
        working-directory: engine
        run: GOOS=windows GOARCH=amd64 go build -o /dev/null .

      - name: Build for macOS
        working-directory: engine
        run: GOOS=darwin GOARCH=arm64 go build -o /dev/null .

  # ── Job 2: Build το TypeScript CLI ────────────────────────────────────────
  build-ts:
    name: TypeScript CLI Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build TypeScript
        run: pnpm build
