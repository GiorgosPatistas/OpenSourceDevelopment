{{define "content"}}
<article class="page">
    <header class="page-header">
        <h1>{{.Page.Title}}</h1>
        <div class="page-meta">
            {{if not .Page.Date.IsZero}}
            <time class="page-date" datetime="{{formatDateISO .Page.Date}}">
                {{formatDate .Page.Date}}
            </time>
            {{end}}
            <span class="reading-time" id="readingTime"></span>
        </div>
        {{if .Page.Description}}
        <p class="page-description">{{.Page.Description}}</p>
        {{end}}
    </header>

    <div class="page-content">
        {{.Content}}
    </div>
</article>
{{end}}
