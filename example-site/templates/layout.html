<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Page.Title}}{{.Page.Title}} — {{end}}{{.Site.SiteTitle}}</title>
    {{if .Page.Description}}
    <meta name="description" content="{{.Page.Description}}">
    {{end}}
    <link rel="stylesheet" href="/css/style.css">
    <script>(function(){var s=localStorage.getItem('theme');var d=window.matchMedia('(prefers-color-scheme: dark)').matches;if(s==='dark'||(s===null&&d)){document.documentElement.setAttribute('data-theme','dark');}})()</script>
</head>
<body>
    <div id="progress-bar"></div>

    <header class="site-header">
        <nav>
            <a href="/" class="site-title">{{.Site.SiteTitle}}</a>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="/">Αρχική</a></li>
                    <li><a href="/about.html">Σχετικά</a></li>
                </ul>
                <button class="theme-toggle" id="themeToggle" aria-label="Εναλλαγή dark mode" title="Εναλλαγή dark mode">
                    <span class="icon-sun">&#9728;&#65039;</span>
                    <span class="icon-moon">&#127769;</span>
                </button>
            </div>
        </nav>
    </header>

    <main class="content">
        {{template "content" .}}
    </main>

    <footer class="site-footer">
        <p>&#169; {{.Site.SiteTitle}} &middot; Φτιαγμένο με my-ssg</p>
    </footer>

    <script>
        // ── Dark Mode ────────────────────────────────────────────────────────
        var htmlEl    = document.documentElement;
        var toggleBtn = document.getElementById('themeToggle');

        function getTheme() {
            return htmlEl.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        }

        function setTheme(theme) {
            if (theme === 'dark') {
                htmlEl.setAttribute('data-theme', 'dark');
            } else {
                htmlEl.removeAttribute('data-theme');
            }
            localStorage.setItem('theme', theme);
        }

        toggleBtn.addEventListener('click', function() {
            setTheme(getTheme() === 'dark' ? 'light' : 'dark');
        });

        // ── Copy Button για Code Blocks ──────────────────────────────────────
        document.querySelectorAll('pre').forEach(function(pre) {
            var code = pre.querySelector('code');
            if (!code) return;

            var wrapper = document.createElement('div');
            wrapper.className = 'code-block';
            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(pre);

            var btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.setAttribute('aria-label', 'Αντιγραφή κώδικα');
            btn.textContent = 'Copy';
            wrapper.appendChild(btn);

            btn.addEventListener('click', function() {
                var text = code.innerText.trimEnd();

                function showCopied() {
                    btn.textContent = 'Copied!';
                    btn.classList.add('copied');
                    setTimeout(function() {
                        btn.textContent = 'Copy';
                        btn.classList.remove('copied');
                    }, 2000);
                }

                if (navigator.clipboard) {
                    navigator.clipboard.writeText(text).then(showCopied).catch(function() {
                        fallbackCopy(text); showCopied();
                    });
                } else {
                    fallbackCopy(text); showCopied();
                }
            });
        });

        function fallbackCopy(text) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity  = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }

        // ── Reading Progress Bar ─────────────────────────────────────────────
        // Ενεργοποιείται μόνο σε άρθρα (σελίδες που έχουν .page-content)
        var progressBar = document.getElementById('progress-bar');
        var articleBody = document.querySelector('.page-content');

        if (articleBody) {
            progressBar.classList.add('visible');

            window.addEventListener('scroll', function() {
                var scrollTop = window.scrollY || document.documentElement.scrollTop;
                var docHeight = document.documentElement.scrollHeight - window.innerHeight;
                var pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
                progressBar.style.width = pct + '%';
            }, { passive: true });
        }
    </script>
</body>
</html>
